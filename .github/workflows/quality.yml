name: Quality gates

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run verify:sources
      - run: npm run validate:release-1
      - run: npm run build
      - name: Start production server
        run: npm run start -- -p 3000 > /tmp/js2next-release-1.log 2>&1 &
      - name: Smoke critical Release 1 routes
        run: npm run e2e:release-1
